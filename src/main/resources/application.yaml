server:
    port: 8080
    servlet:
      context-path: /BKBank
spring:
    datasource:
        url: jdbc:postgresql://localhost:5432/bank
        username: postgres
        password: root
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: update
        properties:
            hibernate:
                format_sql: true
                dialect: org.hibernate.dialect.PostgreSQLDialect
